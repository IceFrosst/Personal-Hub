# Weekly watch agent + individual Tier A/B site checkers.
# Open-egress runners probe official pages for registration language.

name: Event Radar watch agent

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

concurrency:
  group: event-radar-watch-agent
  cancel-in-progress: true

jobs:
  watches:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Probe annual watch URLs
        run: node apps/event-radar/scripts/probe-watches.mjs

      - name: Probe each Tier A/B travel-priority site
        run: node apps/event-radar/scripts/probe-travel-priority.mjs

      - name: Upload probe artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: watch-and-travel-priority-probes
          path: |
            watch-probe-results.json
            travel-priority-probe.json
          retention-days: 30
