# Event Radar — 4x/day ingest.
#
# Vercel Hobby crons can only fire once per day, so the app's own vercel.json
# cron is the daily floor. This free GitHub Actions schedule adds three more
# runs (every 6h ≈ 4x/day) by calling the same production ingest endpoint, which
# gathers new hackathons, enriches a batch, and sends push notifications.
#
# Requires one repo secret: EVENT_RADAR_CRON_SECRET — the same value as the
# CRON_SECRET env var on the icefrosst-event-radar Vercel project.
# Set it at: GitHub repo → Settings → Secrets and variables → Actions → New secret.
#
# GitHub cron is best-effort (runs can be delayed under load) — fine for a 6h
# cadence. Manual runs are available via the "Run workflow" button (workflow_dispatch).

name: Event Radar ingest

on:
  schedule:
    # 01:00, 07:00, 13:00, 19:00 UTC. The 05:00-ish Vercel daily cron fills the gap.
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch: {}

concurrency:
  group: event-radar-ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production ingest
        env:
          CRON_SECRET: ${{ secrets.EVENT_RADAR_CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "EVENT_RADAR_CRON_SECRET is not set — add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          code=$(curl -sS -m 120 -o /tmp/ingest.json -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://icefrosst-event-radar.vercel.app/api/cron/ingest)
          echo "HTTP $code"
          cat /tmp/ingest.json
          echo
          # Fail the run on a non-2xx so a broken cron is visible in the Actions tab.
          [ "$code" -ge 200 ] && [ "$code" -lt 300 ]
