# Open-egress source probe — runs on GitHub-hosted runners (not the sandbox).
# Use this so agents can verify Devpost/Luma/Devfolio/Topcoder/etc. without
# local allowlists. Artifact probe-results.json is the machine-readable report.
#
# Trigger: Actions → Event Radar source probe → Run workflow
# Or: nightly schedule

name: Event Radar source probe

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

concurrency:
  group: event-radar-probe
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Probe source APIs
        run: node apps/event-radar/scripts/probe-sources.mjs

      - name: Upload probe-results.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe-results
          path: probe-results.json
          retention-days: 14
